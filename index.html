<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backlog Trends</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #132043;
        --panel-2: #1b2a52;
        --line: rgba(150, 187, 247, 0.35);
        --text: #eaf1ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        overflow-x: hidden;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #1f2f5b 0%, var(--bg) 62%);
      }

      main {
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 16px 40px;
        display: grid;
        gap: 18px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: linear-gradient(180deg, var(--panel-2), var(--panel));
        padding: 16px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
        width: 100%;
      }

      h1,
      h2 {
        margin: 0;
        font-size: 1.3rem;
      }

      h2 {
        font-size: 1.15rem;
      }

      .chart {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 6px;
        background: rgba(10, 16, 30, 0.35);
        overflow: hidden;
      }

      .chart-canvas {
        width: 100%;
      }

      .chart-canvas--tall {
        min-height: 560px;
      }

      .bar-chart-wrap {
        width: 100%;
        overflow-x: hidden;
        overflow-y: hidden;
      }

      .panel-status {
        margin-top: 8px;
        color: #ffd2d2;
        font-size: 0.84rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section id="trend-panel" class="panel" aria-label="Backlog trend chart">
        <h1>Bug trend across teams</h1>
        <div class="chart">
          <div id="chart" class="chart-canvas chart-canvas--tall"></div>
        </div>
      </section>

      <section id="composition-panel" class="panel" aria-label="Backlog stacked bars">
        <h2>Bug composition by priority</h2>
        <div class="chart">
          <div id="stacked-chart" class="chart-canvas chart-canvas--tall bar-chart-wrap"></div>
        </div>
        <p id="status" class="panel-status" hidden></p>
      </section>
    </main>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
