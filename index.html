<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.plot.ly; style-src 'self' 'unsafe-inline'; style-src-elem 'self' 'unsafe-inline'; style-src-attr 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <title>Backlog Trends</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section id="trend-panel" class="panel" aria-label="Backlog trend chart">
        <h1>Interactive chart - Bug trend across teams</h1>
        <div class="chart">
          <div id="chart" class="chart-canvas chart-canvas--tall"></div>
        </div>
      </section>

      <section id="composition-panel" class="panel" aria-label="Backlog stacked bars">
        <h2>Interactive chart - Bug composition by priority</h2>
        <div class="chart">
          <div id="stacked-chart" class="chart-canvas chart-canvas--tall bar-chart-wrap"></div>
        </div>
        <p id="status" class="panel-status" hidden></p>
      </section>
    </main>

    <script
      src="https://cdn.plot.ly/plotly-2.35.2.min.js"
      integrity="sha384-cCVCZkAjYNxaYKbM8lsArLznDF/SvMFr1jcZrvOpSTCa0W40ZAdLzHCEulnUa5i7"
      crossorigin="anonymous"
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
