<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Field & Fortune</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f5efe3;
        font-family: "Trebuchet MS", "Verdana", sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
        border-radius: 18px;
        box-shadow: 0 24px 60px rgba(40, 26, 8, 0.25);
      }
      #sr-instructions {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="sr-instructions">
      Field and Fortune farming game. Use arrow keys or WASD to move the cursor. Press Space to plant or harvest. Press B to buy seeds.
    </div>
    <canvas id="game" width="960" height="640" aria-describedby="sr-instructions"></canvas>
    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const LOGICAL_WIDTH = 960;
      const LOGICAL_HEIGHT = 640;

      const GRID_COLS = 10;
      const GRID_ROWS = 6;
      const TILE_SIZE = 80;
      const FIELD_ORIGIN = { x: 80, y: 150 };

      const STAGE_TIME = 6; // seconds per growth stage

      const state = {
        mode: "title",
        time: 0,
        cursor: { col: 4, row: 2 },
        seeds: 6,
        coins: 0,
        dayTimer: 0,
        dayLength: 60,
        grid: [],
        message: "",
      };

      function createGrid() {
        state.grid = Array.from({ length: GRID_ROWS }, () =>
          Array.from({ length: GRID_COLS }, () => ({ stage: 0, growth: 0 }))
        );
      }

      createGrid();

      const input = {
        left: false,
        right: false,
        up: false,
        down: false,
      };

      const keyMap = new Map([
        ["ArrowLeft", "left"],
        ["KeyA", "left"],
        ["ArrowRight", "right"],
        ["KeyD", "right"],
        ["ArrowUp", "up"],
        ["KeyW", "up"],
        ["ArrowDown", "down"],
        ["KeyS", "down"],
      ]);

      let moveCooldown = 0;

      function onKeyDown(event) {
        if (event.repeat) return;
        if (event.code === "Enter") {
          if (state.mode === "title") {
            state.mode = "playing";
            state.message = "";
          }
          return;
        }

        if (event.code === "Space") {
          if (state.mode === "playing") handlePlantOrHarvest();
        }

        if (event.code === "KeyB") {
          if (state.mode === "playing") handleBuySeed();
        }

        if (event.code === "KeyR") {
          if (state.mode !== "title") resetGame();
        }

        if (event.code === "KeyF") {
          toggleFullscreen();
        }

        const mapped = keyMap.get(event.code);
        if (mapped) input[mapped] = true;
      }

      function onKeyUp(event) {
        const mapped = keyMap.get(event.code);
        if (mapped) input[mapped] = false;
      }

      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      }

      function resetGame() {
        state.mode = "title";
        state.time = 0;
        state.cursor = { col: 4, row: 2 };
        state.seeds = 6;
        state.coins = 0;
        state.dayTimer = 0;
        state.message = "";
        createGrid();
      }

      function handlePlantOrHarvest() {
        const tile = state.grid[state.cursor.row][state.cursor.col];
        if (tile.stage === 0) {
          if (state.seeds <= 0) {
            state.message = "Out of seeds! Buy more with B.";
            return;
          }
          tile.stage = 1;
          tile.growth = 0;
          state.seeds -= 1;
          state.message = "Planted a seed.";
        } else if (tile.stage === 3) {
          tile.stage = 0;
          tile.growth = 0;
          state.coins += 2;
          state.seeds += 1;
          state.message = "Harvested! +2 coins, +1 seed.";
        } else {
          state.message = "Keep growing...";
        }
      }

      function handleBuySeed() {
        if (state.coins >= 2) {
          state.coins -= 2;
          state.seeds += 1;
          state.message = "Bought 1 seed.";
        } else {
          state.message = "Need 2 coins to buy seeds.";
        }
      }

      function update(dt) {
        if (state.mode !== "playing") return;

        state.time += dt;
        state.dayTimer = (state.dayTimer + dt) % state.dayLength;

        moveCooldown -= dt;
        if (moveCooldown <= 0) {
          const dx = (input.right ? 1 : 0) - (input.left ? 1 : 0);
          const dy = (input.down ? 1 : 0) - (input.up ? 1 : 0);
          if (dx !== 0 || dy !== 0) {
            state.cursor.col = clamp(state.cursor.col + dx, 0, GRID_COLS - 1);
            state.cursor.row = clamp(state.cursor.row + dy, 0, GRID_ROWS - 1);
            moveCooldown = 0.12;
          }
        }

        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            const tile = state.grid[r][c];
            if (tile.stage > 0 && tile.stage < 3) {
              tile.growth += dt;
              if (tile.growth >= STAGE_TIME) {
                tile.stage += 1;
                tile.growth = 0;
              }
            }
          }
        }
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function render() {
        resizeCanvas();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const scale = canvas.width / LOGICAL_WIDTH;
        ctx.save();
        ctx.scale(scale, scale);

        drawBackground();
        if (state.mode === "title") {
          drawTitle();
        } else {
          drawField();
          drawHud();
        }

        ctx.restore();
      }

      function resizeCanvas() {
        const maxWidth = Math.min(window.innerWidth - 24, LOGICAL_WIDTH);
        const maxHeight = Math.min(window.innerHeight - 24, LOGICAL_HEIGHT);
        const ratio = LOGICAL_WIDTH / LOGICAL_HEIGHT;
        let width = maxWidth;
        let height = width / ratio;
        if (height > maxHeight) {
          height = maxHeight;
          width = height * ratio;
        }
        canvas.width = Math.floor(width * devicePixelRatio);
        canvas.height = Math.floor(height * devicePixelRatio);
        canvas.style.width = `${Math.floor(width)}px`;
        canvas.style.height = `${Math.floor(height)}px`;
        ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      }

      function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, LOGICAL_HEIGHT);
        grad.addColorStop(0, "#f7e9c4");
        grad.addColorStop(1, "#f0cda0");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

        ctx.fillStyle = "#f7f0dc";
        ctx.fillRect(0, 0, LOGICAL_WIDTH, 90);

        ctx.fillStyle = "#4a3a1b";
        ctx.font = "28px Trebuchet MS";
        ctx.fillText("Field & Fortune", 40, 56);

        ctx.fillStyle = "rgba(80, 60, 20, 0.1)";
        for (let i = 0; i < 14; i++) {
          ctx.beginPath();
          ctx.arc(80 + i * 70, 110 + (i % 2) * 6, 26, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawTitle() {
        ctx.fillStyle = "#3b2a11";
        ctx.font = "52px Trebuchet MS";
        ctx.fillText("Grow your tiny farm", 120, 260);

        ctx.font = "24px Trebuchet MS";
        ctx.fillText("Press Enter to start", 320, 320);

        ctx.font = "20px Trebuchet MS";
        ctx.fillText("Move: Arrow Keys / WASD", 300, 390);
        ctx.fillText("Plant / Harvest: Space", 315, 420);
        ctx.fillText("Buy Seed (2 coins): B", 308, 450);
        ctx.fillText("Reset: R, Fullscreen: F", 305, 480);
      }

      function drawField() {
        ctx.fillStyle = "#6f4e2f";
        ctx.fillRect(FIELD_ORIGIN.x - 20, FIELD_ORIGIN.y - 20, TILE_SIZE * GRID_COLS + 40, TILE_SIZE * GRID_ROWS + 40);

        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            const x = FIELD_ORIGIN.x + c * TILE_SIZE;
            const y = FIELD_ORIGIN.y + r * TILE_SIZE;
            ctx.fillStyle = "#8b5a35";
            ctx.fillRect(x + 4, y + 4, TILE_SIZE - 8, TILE_SIZE - 8);

            const tile = state.grid[r][c];
            drawCrop(tile, x, y);
          }
        }

        const cursorX = FIELD_ORIGIN.x + state.cursor.col * TILE_SIZE;
        const cursorY = FIELD_ORIGIN.y + state.cursor.row * TILE_SIZE;
        ctx.strokeStyle = "#ffe46a";
        ctx.lineWidth = 4;
        ctx.strokeRect(cursorX + 6, cursorY + 6, TILE_SIZE - 12, TILE_SIZE - 12);
      }

      function drawCrop(tile, x, y) {
        if (tile.stage === 0) return;
        const centerX = x + TILE_SIZE / 2;
        const centerY = y + TILE_SIZE / 2;

        if (tile.stage === 1) {
          ctx.fillStyle = "#c1a04b";
          ctx.beginPath();
          ctx.arc(centerX, centerY + 12, 6, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#5a8a3a";
          ctx.fillRect(centerX - 4, centerY - 6, 8, 18);
        } else if (tile.stage === 2) {
          ctx.fillStyle = "#5fa34d";
          ctx.beginPath();
          ctx.arc(centerX, centerY, 14, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "#4c7a3a";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(centerX, centerY + 8);
          ctx.lineTo(centerX, centerY + 28);
          ctx.stroke();
        } else if (tile.stage === 3) {
          ctx.fillStyle = "#e3b545";
          ctx.beginPath();
          ctx.arc(centerX, centerY - 4, 18, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#658b36";
          ctx.fillRect(centerX - 5, centerY + 8, 10, 20);
        }
      }

      function drawHud() {
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        ctx.fillRect(580, 20, 340, 96);

        ctx.fillStyle = "#3a2a12";
        ctx.font = "20px Trebuchet MS";
        ctx.fillText(`Seeds: ${state.seeds}`, 600, 50);
        ctx.fillText(`Coins: ${state.coins}`, 600, 78);

        const dayPct = state.dayTimer / state.dayLength;
        ctx.fillText(`Day: ${Math.floor((dayPct + 0.001) * 12) + 1}/12`, 720, 50);

        ctx.strokeStyle = "#6f4e2f";
        ctx.strokeRect(600, 86, 280, 14);
        ctx.fillStyle = "#88b04b";
        ctx.fillRect(600, 86, 280 * dayPct, 14);

        if (state.message) {
          ctx.fillStyle = "rgba(255, 245, 200, 0.9)";
          ctx.fillRect(120, 560, 720, 52);
          ctx.fillStyle = "#3a2a12";
          ctx.font = "18px Trebuchet MS";
          ctx.fillText(state.message, 150, 594);
        }
      }

      function gameLoop(timestamp) {
        if (!gameLoop.last) gameLoop.last = timestamp;
        const dt = (timestamp - gameLoop.last) / 1000;
        gameLoop.last = timestamp;
        update(Math.min(dt, 0.05));
        render();
        requestAnimationFrame(gameLoop);
      }

      window.render_game_to_text = () => {
        const crops = [];
        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            const tile = state.grid[r][c];
            if (tile.stage > 0) {
              crops.push({ col: c, row: r, stage: tile.stage });
            }
          }
        }
        return JSON.stringify({
          mode: state.mode,
          note: "Origin is top-left. X increases to the right, Y increases downward.",
          cursor: { col: state.cursor.col, row: state.cursor.row },
          crops,
          seeds: state.seeds,
          coins: state.coins,
          day: Math.floor((state.dayTimer / state.dayLength) * 12) + 1,
        });
      };

      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let i = 0; i < steps; i++) {
          update(1 / 60);
        }
        render();
      };

      window.addEventListener("resize", render);
      window.addEventListener("fullscreenchange", render);
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
