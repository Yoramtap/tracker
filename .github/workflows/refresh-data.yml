name: Refresh Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

concurrency:
  group: "refresh-data"
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify refresh secrets
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          if [ -z "$ATLASSIAN_EMAIL" ] || [ -z "$ATLASSIAN_API_TOKEN" ]; then
            echo "Missing ATLASSIAN_EMAIL or ATLASSIAN_API_TOKEN."
            exit 1
          fi

      - name: Refresh dashboard data
        env:
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          ATLASSIAN_SITE: ${{ secrets.ATLASSIAN_SITE }}
        run: npm run data:refresh:clean

      - name: Validate snapshots
        run: npm run data:validate

      - name: Build static site artifact
        run: npm run site:build

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit refreshed data
        run: |
          git add data
          if git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
            exit 0
          fi
          git commit -m "Refresh dashboard data"
          git push
