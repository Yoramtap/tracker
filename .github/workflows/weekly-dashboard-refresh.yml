name: Daily Dashboard Refresh

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Refresh even when today's snapshot already exists"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "13 7 * * *"
    - cron: "43 7 * * *"
    - cron: "13 8 * * *"

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weekly-dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      did_commit: ${{ steps.commit.outputs.did_commit }}
    steps:
      - name: Log refresh trigger
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          FORCE_REFRESH: ${{ inputs.force || false }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual refresh requested (force=$FORCE_REFRESH)."
            exit 0
          fi

          echo "GitHub triggered schedule: $EVENT_SCHEDULE"
          echo "Current Europe/Amsterdam time: $(TZ=Europe/Amsterdam date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check repo-map audit health
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          audit_json="$(
            gh run list \
              --workflow team-repo-map-audit.yml \
              --status completed \
              --limit 1 \
              --json conclusion,createdAt,databaseId,url
          )"

          node - <<'NODE' "$audit_json"
          const fs = require("fs");
          function appendSummary(text) {
            if (process.env.GITHUB_STEP_SUMMARY) {
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, text);
            }
          }

          const rows = JSON.parse(process.argv[2] || "[]");
          const latest = Array.isArray(rows) ? rows[0] : null;
          appendSummary("## Repo-map audit health\n");
          if (!latest) {
            console.log("No completed team repo-map audit run was found yet.");
            appendSummary(
              "\nNo completed team repo-map audit run was found yet. This is a warning until the first scheduled audit completes.\n"
            );
            process.exit(0);
          }

          const createdAt = new Date(latest.createdAt);
          const ageDays = Number.isFinite(createdAt.getTime())
            ? (Date.now() - createdAt.getTime()) / 86400000
            : Infinity;
          const summary = [
            "",
            `Latest audit run: ${latest.url}`,
            `Conclusion: ${latest.conclusion || "unknown"}`,
            `Created: ${latest.createdAt || "unknown"}`,
            `Age: ${Number.isFinite(ageDays) ? ageDays.toFixed(1) : "unknown"} days`,
            ""
          ].join("\n");
          appendSummary(summary);

          if (latest.conclusion !== "success") {
            console.error(`Latest team repo-map audit was not successful: ${latest.conclusion || "unknown"}`);
            process.exit(1);
          }
          if (!Number.isFinite(ageDays) || ageDays > 8) {
            console.error("Latest successful team repo-map audit is stale.");
            process.exit(1);
          }
          NODE

      - name: Check snapshot freshness
        id: freshness
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_REFRESH: ${{ inputs.force || false }}
        run: |
          if [ "$FORCE_REFRESH" = "true" ]; then
            echo "Force refresh requested."
            echo "should_refresh=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          today="$(TZ=Europe/Amsterdam date +%F)"
          snapshot_date="$(
            node -e '
              const fs = require("fs");
              const snapshot = JSON.parse(fs.readFileSync("data/snapshot.json", "utf8"));
              const timestamp = snapshot.updatedAt || snapshot.generatedAt || "";
              if (!timestamp) process.exit(0);
              const formatter = new Intl.DateTimeFormat("en-CA", {
                timeZone: "Europe/Amsterdam",
                year: "numeric",
                month: "2-digit",
                day: "2-digit"
              });
              console.log(formatter.format(new Date(timestamp)));
            '
          )"

          echo "Today in Europe/Amsterdam: $today"
          echo "Current snapshot date in Europe/Amsterdam: $snapshot_date"

          if [ "$snapshot_date" = "$today" ]; then
            echo "Dashboard snapshot is already fresh for today."
            echo "should_refresh=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_refresh=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.freshness.outputs.should_refresh == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.freshness.outputs.should_refresh == 'true'
        run: npm ci

      - name: Refresh dashboard data
        if: steps.freshness.outputs.should_refresh == 'true'
        env:
          ATLASSIAN_SITE: ${{ secrets.ATLASSIAN_SITE }}
          ATLASSIAN_EMAIL: ${{ secrets.ATLASSIAN_EMAIL }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SPRINT_INCLUDE_ACTIVE: "false"
        run: |
          if [ -z "$ATLASSIAN_SITE" ] || [ -z "$ATLASSIAN_EMAIL" ] || [ -z "$ATLASSIAN_API_TOKEN" ] || [ -z "$GH_TOKEN" ]; then
            echo "Missing one or more required secrets: ATLASSIAN_SITE, ATLASSIAN_EMAIL, ATLASSIAN_API_TOKEN, GH_TOKEN." >&2
            exit 1
          fi

          npm run data:refresh

      - name: Validate dashboard snapshots
        if: steps.freshness.outputs.should_refresh == 'true'
        run: npm run data:validate

      - name: Build dashboard
        if: steps.freshness.outputs.should_refresh == 'true'
        run: npm run build

      - name: Commit snapshot changes
        id: commit
        if: steps.freshness.outputs.should_refresh == 'true'
        run: |
          echo "did_commit=false" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/snapshot.json \
            data/backlog-snapshot.json \
            data/contributors-snapshot.json \
            data/management-facility-snapshot.json \
            data/pr-activity-snapshot.json \
            data/pr-cycle-snapshot.json \
            data/product-cycle-shipments-snapshot.json \
            data/product-cycle-snapshot.json

          if git diff --cached --quiet; then
            echo "No dashboard snapshot changes to commit."
            exit 0
          fi

          git commit -m "chore: refresh tracker snapshots"
          git push origin HEAD:main
          echo "did_commit=true" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        if: steps.commit.outputs.did_commit == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static files
        if: steps.commit.outputs.did_commit == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: refresh
    if: needs.refresh.outputs.did_commit == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
